<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Guardians of Ganja</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/assets/img/logo-icon.png" />
    <link rel="apple-touch-icon" href="/assets/img/logo-icon.png" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/portal.css" />
    <script src="/assets/js/portal.js"></script>
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">

        <div class="login-brand">
          <img src="/assets/img/logo-full.png" alt="Guardians of Ganja" class="login-brand-mark" />
        </div>

        <!-- Tabs -->
        <div class="login-tabs" role="tablist">
          <button class="login-tab active" id="tab-signin" role="tab" aria-selected="true"  aria-controls="panel-signin">Sign In</button>
          <button class="login-tab"        id="tab-signup" role="tab" aria-selected="false" aria-controls="panel-signup">Create Account</button>
        </div>

        <!-- Sign In panel -->
        <div id="panel-signin" role="tabpanel" aria-labelledby="tab-signin">
          <form class="login-form" id="signin-form" novalidate>
            <div class="login-field">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="login-field">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" name="password" autocomplete="current-password" placeholder="••••••••" required />
            </div>
            <p class="login-error" id="signin-error" hidden></p>
            <button type="submit" class="btn btn-primary login-submit" id="signin-btn">Sign In</button>
          </form>

          <div class="login-divider"><span>or</span></div>

          <a href="/api/auth/google" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M43.6 20H24v8h11.3C33.6 33 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.3 4.2-17.7 10.7z"/><path fill="#FBBC05" d="M24 44c5.2 0 9.8-1.7 13.4-4.7l-6.2-5.1C29.3 35.5 26.8 36 24 36c-5.3 0-9.7-3-11.3-7.4l-6.5 5C9.7 39.8 16.3 44 24 44z"/><path fill="#EA4335" d="M43.6 20H24v8h11.3c-.8 2.1-2.2 3.9-4.1 5.2l6.2 5.1C41 35.3 44 30 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
            Continue with Google
          </a>
        </div>

        <!-- Sign Up panel -->
        <div id="panel-signup" role="tabpanel" aria-labelledby="tab-signup" hidden>
          <form class="login-form" id="signup-form" novalidate>
            <div class="login-field">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" name="full_name" autocomplete="name" placeholder="Your full name" />
            </div>
            <div class="login-field">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="login-field">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" name="password" autocomplete="new-password" placeholder="At least 8 characters" required />
            </div>
            <p class="login-error" id="signup-error" hidden></p>
            <button type="submit" class="btn btn-primary login-submit" id="signup-btn">Create Account</button>
          </form>

          <div class="login-divider"><span>or</span></div>

          <a href="/api/auth/google" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M43.6 20H24v8h11.3C33.6 33 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.3 4.2-17.7 10.7z"/><path fill="#FBBC05" d="M24 44c5.2 0 9.8-1.7 13.4-4.7l-6.2-5.1C29.3 35.5 26.8 36 24 36c-5.3 0-9.7-3-11.3-7.4l-6.5 5C9.7 39.8 16.3 44 24 44z"/><path fill="#EA4335" d="M43.6 20H24v8h11.3c-.8 2.1-2.2 3.9-4.1 5.2l6.2 5.1C41 35.3 44 30 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
            Continue with Google
          </a>
        </div>

      </div>
    </div>

        <footer class="site-footer">
      <div class="container footer-grid">
        <div class="footer-col footer-col--left">
          <p class="footer-eyebrow">Explore</p>
          <p class="footer-links"><a href="/">Home</a><span>/</span><a href="/services">Services</a><span>/</span><a href="/contact">Contact</a><span>/</span><a href="/gallery">Gallery</a></p>
        </div>
        <div class="footer-col footer-col--center">
          <a href="/" aria-label="Guardians of Ganja Home"><img src="/assets/img/logo-full.png" alt="Guardians of Ganja" class="footer-logo-img" /></a>
          <p class="footer-social">
            <a href="https://www.instagram.com/guardians_of_ganja/" target="_blank" rel="noopener noreferrer" aria-label="Guardians of Ganja on Instagram">Instagram</a>
            <span>/</span>
            <a href="https://www.facebook.com/guardians-of-ganja/" target="_blank" rel="noopener noreferrer" aria-label="Guardians of Ganja on Facebook">Facebook</a>
            <span>/</span>
            <a href="https://hellalit.app/guardiansofganja" target="_blank" rel="noopener noreferrer" aria-label="Guardians of Ganja on HellaLit">HellaLit</a>
          </p>
        </div>
        <div class="footer-col footer-col--right">
          <p class="footer-eyebrow">Legal</p>
          <p class="footer-links"><a href="/privacy">Privacy</a><span>/</span><a href="/terms">Terms</a></p>
        </div>
      </div>
      <div class="footer-credit" style="display:flex;align-items:center;justify-content:center;gap:1rem;width:100%;border-top:1px solid rgba(58,84,98,0.2);margin-top:0.8rem;padding:0.5rem 0 0.8rem;">
        <span class="footer-powered"><span class="footer-credit-text">Powered by</span>&nbsp;<a href="https://lucentengine.ai" target="_blank" rel="noopener noreferrer" aria-label="Lucent Engine"><img class="footer-credit-logo" src="/assets/img/lucent-engine.png" alt="Lucent Engine" loading="lazy" style="height:36px;width:auto;display:inline-block;vertical-align:middle;" /></a></span>
        <span class="footer-copyright footer-credit-text">&copy; 2026 All rights reserved.</span>
      </div>
    </footer>

    <script>
    (function () {
      // Redirect already-logged-in users
      Portal.api.auth.me().then(function (data) {
        window.location.href = data.user.role === "admin" ? "/admin" : "/dashboard";
      }).catch(function () { /* not logged in — stay on page */ });

      var redirect = new URLSearchParams(window.location.search).get("redirect");

      // ── Tab switching ────────────────────────────────────────
      document.getElementById("tab-signin").addEventListener("click", function () { switchTab("signin"); });
      document.getElementById("tab-signup").addEventListener("click", function () { switchTab("signup"); });

      function switchTab(name) {
        ["signin", "signup"].forEach(function (t) {
          var isActive = t === name;
          document.getElementById("tab-" + t).classList.toggle("active", isActive);
          document.getElementById("tab-" + t).setAttribute("aria-selected", isActive ? "true" : "false");
          document.getElementById("panel-" + t).hidden = !isActive;
        });
      }

      // If URL has ?tab=signup, open signup panel
      if (new URLSearchParams(window.location.search).get("tab") === "signup") switchTab("signup");

      // ── Sign In ──────────────────────────────────────────────
      var signinForm = document.getElementById("signin-form");
      var signinBtn  = document.getElementById("signin-btn");
      var signinErr  = document.getElementById("signin-error");

      function showSigninError(msg) { signinErr.textContent = msg; signinErr.hidden = false; signinBtn.disabled = false; signinBtn.textContent = "Sign In"; }

      signinForm.addEventListener("submit", function (e) {
        e.preventDefault();
        signinErr.hidden = true;
        signinBtn.disabled = true;
        signinBtn.textContent = "Signing in…";
        var email    = document.getElementById("signin-email").value.trim();
        var password = document.getElementById("signin-password").value;
        if (!email || !password) { showSigninError("Please enter your email and password."); return; }
        Portal.api.auth.login(email, password).then(function (data) {
          window.location.href = redirect || (data.user.role === "admin" ? "/admin" : "/dashboard");
        }).catch(function (e) { showSigninError(e.message || "Invalid email or password."); });
      });

      // ── Sign Up ──────────────────────────────────────────────
      var signupForm = document.getElementById("signup-form");
      var signupBtn  = document.getElementById("signup-btn");
      var signupErr  = document.getElementById("signup-error");

      function showSignupError(msg) { signupErr.textContent = msg; signupErr.hidden = false; signupBtn.disabled = false; signupBtn.textContent = "Create Account"; }

      signupForm.addEventListener("submit", function (e) {
        e.preventDefault();
        signupErr.hidden = true;
        signupBtn.disabled = true;
        signupBtn.textContent = "Creating account…";
        var name     = document.getElementById("signup-name").value.trim();
        var email    = document.getElementById("signup-email").value.trim();
        var password = document.getElementById("signup-password").value;
        if (!email)           { showSignupError("Please enter your email."); return; }
        if (!password)        { showSignupError("Please enter a password."); return; }
        if (password.length < 8) { showSignupError("Password must be at least 8 characters."); return; }
        Portal.api.auth.signup(email, password, name).then(function (data) {
          window.location.href = redirect || "/dashboard";
        }).catch(function (e) { showSignupError(e.message || "Failed to create account."); });
      });
    })();
    </script>
  </body>
</html>
