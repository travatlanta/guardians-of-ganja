<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Guardians of Ganja</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/assets/img/logo-icon.png" />
    <link rel="apple-touch-icon" href="/assets/img/logo-icon.png" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/portal.css" />
    <script src="/assets/js/portal.js"></script>
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">

        <!-- Brand -->
        <div class="login-brand">
          <img src="/assets/img/logo-full.png" alt="Guardians of Ganja" class="login-brand-mark" />
        </div>

        <!-- Clerk Sign-In Widget -->
        <div class="login-clerk-wrap" id="clerk-signin"></div>
        <p id="login-loading" style="text-align:center;color:#6b8a78;font-size:0.85rem;padding:2rem 0;">Loading…</p>
      </div>
    </div>

    <script>
    Portal.loadClerk(function (clerk) {
      document.getElementById("login-loading").style.display = "none";
      if (clerk.user) {
        var role = (clerk.user.publicMetadata && clerk.user.publicMetadata.role) || "customer";
        window.location.href = role === "admin" ? "/admin" : "/dashboard";
        return;
      }
      clerk.mountSignIn(document.getElementById("clerk-signin"), {
        afterSignInUrl:  "/dashboard",
        afterSignUpUrl:  "/dashboard",
        signUpUrl:       "/login",
        appearance: {
          variables: {
            colorPrimary:         "#2fb073",
            colorBackground:      "#0a1510",
            colorText:            "#e8f1ea",
            colorTextSecondary:   "#6b8a78",
            colorInputBackground: "#0d1a12",
            colorInputText:       "#e8f1ea",
            borderRadius:         "8px",
            fontFamily:           '"Sora", "Segoe UI", sans-serif'
          },
          elements: {
            card:        { boxShadow: "none", border: "none", background: "transparent", padding: "0" },
            rootBox:     { width: "100%" },
            formButtonPrimary: { background: "#2fb073" }
          }
        }
      });
    });
    </script>

    <footer class="site-footer" style="margin-top:0;padding:0.9rem 0 1.2rem;">
      <div class="footer-credit" style="display:flex;align-items:center;justify-content:center;gap:1rem;width:100%;border-top:1px solid rgba(58,84,98,0.2);margin-top:0.8rem;padding:0.5rem 0 0.8rem;">
        <span class="footer-credit-text">© 2026 All rights reserved.</span><span style="color:#2a4335;margin:0 0.3rem;">|</span><span class="footer-credit-text">Powered by</span>
        <a href="https://lucentengine.ai" target="_blank" rel="noopener noreferrer" aria-label="Lucent Engine">
          <img class="footer-credit-logo" src="/assets/img/lucent-engine.png" alt="Lucent Engine" loading="lazy" style="height:36px;width:auto;display:inline-block;vertical-align:middle;" />
        </a>
      </div>
    </footer>

  </body>
</html>
