<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accept Invite — Guardians of Ganja</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/assets/img/logo-icon.png" />
    <link rel="apple-touch-icon" href="/assets/img/logo-icon.png" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/portal.css" />
    <script src="/assets/js/portal.js"></script>
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">

        <div class="login-brand">
          <img src="/assets/img/logo-full.png" alt="Guardians of Ganja" class="login-brand-mark" />
        </div>

        <div id="invite-loading" style="text-align:center;padding:1.5rem 0;">
          <span class="spinner" style="display:inline-block;"></span>
          <p style="color:var(--muted);font-size:0.9rem;margin-top:0.8rem;">Verifying invite&hellip;</p>
        </div>

        <div id="invite-invalid" style="display:none;text-align:center;padding:1rem 0;">
          <p style="color:#e07070;font-size:0.95rem;" id="invite-invalid-msg">This invite link is invalid or has expired.</p>
          <p style="color:var(--muted);font-size:0.85rem;margin-top:0.5rem;">Contact your administrator for a new invite.</p>
        </div>

        <form class="login-form" id="invite-form" novalidate style="display:none;">
          <p style="color:var(--muted);font-size:0.82rem;margin:0 0 0.3rem;">You&rsquo;ve been invited to join as <strong id="invite-role-label"></strong>.</p>
          <p style="color:var(--text);font-size:0.9rem;font-weight:600;margin:0 0 1rem;" id="invite-email-label"></p>

          <div class="login-field">
            <label for="invite-name">Full Name</label>
            <input type="text" id="invite-name" name="full_name" autocomplete="name" placeholder="Your full name" />
          </div>
          <div class="login-field">
            <label for="invite-password">Create Password</label>
            <input type="password" id="invite-password" name="password" autocomplete="new-password" placeholder="At least 8 characters" required />
          </div>
          <div class="login-field">
            <label for="invite-password2">Confirm Password</label>
            <input type="password" id="invite-password2" name="password2" autocomplete="new-password" placeholder="Repeat password" required />
          </div>
          <p class="login-error" id="invite-error" hidden></p>
          <button type="submit" class="btn btn-primary login-submit" id="invite-btn">Create Account</button>
        </form>

      </div>
    </div>

            <footer class="site-footer--compact">
      <a href="/" class="footer-compact-brand" aria-label="Guardians of Ganja Home">
        <img src="/assets/img/logo-full.png" alt="Guardians of Ganja" />
      </a>
      <p class="footer-compact-links">
        <a href="/">Home</a><span>/</span><a href="/services">Services</a><span>/</span><a href="/contact">Contact</a><span>/</span><a href="/gallery">Gallery</a><span>/</span><a href="/privacy">Privacy</a><span>/</span><a href="/terms">Terms</a>
      </p>
      <div class="footer-compact-right">
        <span>Powered by</span>
        <a href="https://lucentengine.ai" target="_blank" rel="noopener noreferrer" aria-label="Lucent Engine"><img src="/assets/img/lucent-engine.png" alt="Lucent Engine" /></a>
        <span>&copy; 2026</span>
      </div>
    </footer>

    <script>
    (function () {
      var token = new URLSearchParams(window.location.search).get("token");

      if (!token) {
        document.getElementById("invite-loading").style.display = "none";
        document.getElementById("invite-invalid").style.display = "block";
        document.getElementById("invite-invalid-msg").textContent = "No invite token found in this URL.";
        return;
      }

      // Validate token
      Portal.apiFetch("/api/auth/invite?token=" + encodeURIComponent(token))
        .then(function (data) {
          document.getElementById("invite-loading").style.display = "none";
          document.getElementById("invite-email-label").textContent = data.email;
          document.getElementById("invite-role-label").textContent = data.role === "admin" ? "an Admin" : "a Client";
          document.getElementById("invite-form").style.display = "flex";
        })
        .catch(function (err) {
          document.getElementById("invite-loading").style.display = "none";
          document.getElementById("invite-invalid").style.display = "block";
          document.getElementById("invite-invalid-msg").textContent = err.message || "Invalid or expired invite.";
        });

      var form = document.getElementById("invite-form");
      var btn  = document.getElementById("invite-btn");
      var err  = document.getElementById("invite-error");

      function showError(msg) { err.textContent = msg; err.hidden = false; btn.disabled = false; btn.textContent = "Create Account"; }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.hidden = true;
        btn.disabled = true;
        btn.textContent = "Creating account…";

        var name  = document.getElementById("invite-name").value.trim();
        var pass  = document.getElementById("invite-password").value;
        var pass2 = document.getElementById("invite-password2").value;

        if (!pass)            { showError("Please enter a password."); return; }
        if (pass.length < 8)  { showError("Password must be at least 8 characters."); return; }
        if (pass !== pass2)   { showError("Passwords do not match."); return; }

        Portal.apiFetch("/api/auth/accept-invite", {
          method: "POST",
          body: JSON.stringify({ token: token, full_name: name, password: pass })
        })
          .then(function (data) {
            window.location.href = data.user.role === "admin" ? "/admin" : "/dashboard";
          })
          .catch(function (e) {
            showError(e.message || "Failed to create account.");
          });
      });
    })();
    </script>
  </body>
</html>
